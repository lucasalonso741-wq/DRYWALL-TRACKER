<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AA Drywall Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0C0E14;
  --surface: #13161F;
  --surface2: #1A1D28;
  --surface3: #222637;
  --border: #2A2E42;
  --border2: #353A52;
  --ink: #E8EAF0;
  --ink2: #9BA5BE;
  --ink3: #5A6280;
  --accent: #FF6B35;
  --accent2: #FF8C5A;
  --blue: #4F8EF7;
  --green: #34D399;
  --yellow: #FBBF24;
  --red: #F87171;
  --purple: #A78BFA;
  --sidebar-w: 72px;
  --r: 12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:1.2;}
input,select,button,textarea{font-family:'DM Sans',sans-serif;}
a{color:var(--accent);}
#app{display:flex;min-height:100vh;}
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;left:0;bottom:0;z-index:100;padding:16px 0;gap:4px;}
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}
.nav-icon-btn{width:48px;height:48px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--ink3);transition:all .15s;border:none;background:none;gap:2px;}
.nav-icon-btn:hover{background:var(--surface2);color:var(--ink);}
.nav-icon-btn.active{background:var(--accent);color:#fff;}
.nav-icon-btn span.label{font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;opacity:.8;}
.nav-badge-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--yellow);border:2px solid var(--surface);}
.nav-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#c026d3);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:8px;overflow:hidden;cursor:pointer;}
.nav-logo img{width:36px;height:36px;object-fit:cover;display:none;}
.nav-divider{width:32px;height:1px;background:var(--border);margin:4px 0;}
.nav-sync-btn{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--ink3);transition:all .15s;border:none;background:none;margin-top:auto;}
.nav-sync-btn:hover{background:var(--surface2);color:var(--green);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--ink3);}
.sync-dot.ok{background:var(--green);}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;letter-spacing:-.01em;color:var(--ink);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.sync-label{font-size:12px;color:var(--ink3);}
.page{display:none;padding:28px 36px;min-height:calc(100vh - 56px);max-width:1400px;}
.page.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);}
.card-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;letter-spacing:-.01em;}
.card-body{padding:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;}
.stat-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-weight:600;margin-bottom:6px;}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;line-height:1;}
.stat-sub{font-size:11px;color:var(--ink3);margin-top:4px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:opacity .12s;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--ink);border:1px solid var(--border);}
.btn-danger{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#000;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--ink);font-size:14px;outline:none;transition:border-color .12s;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--ink3);}
.inp-sm{padding:6px 10px;font-size:13px;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);font-weight:600;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--ink);font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface2);}
.tbl-r{text-align:right;font-weight:600;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:rgba(79,142,247,.15);color:var(--blue);}
.badge-green{background:rgba(52,211,153,.15);color:var(--green);}
.badge-yellow{background:rgba(251,191,36,.15);color:var(--yellow);}
.badge-red{background:rgba(248,113,113,.15);color:var(--red);}
.badge-gray{background:var(--surface3);color:var(--ink2);}
.badge-orange{background:rgba(255,107,53,.15);color:var(--accent);}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;font-weight:500;margin-bottom:10px;}
.alert-y{background:rgba(251,191,36,.08);color:var(--yellow);border:1px solid rgba(251,191,36,.25);}
.alert-r{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.25);}
.alert-g{background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.25);}
.alert-b{background:rgba(79,142,247,.08);color:var(--blue);border:1px solid rgba(79,142,247,.25);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:6px;border:none;background:var(--surface2);cursor:pointer;font-size:18px;color:var(--ink2);display:flex;align-items:center;justify-content:center;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.tab-btn{padding:10px 20px;border:none;background:none;font-size:14px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;font-family:'DM Sans',sans-serif;}
.tab-btn:hover{color:var(--ink);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.prog{height:6px;background:var(--surface3);border-radius:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width .4s;}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:16px 0;}
.unit-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;position:relative;}
.unit-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.unit-card.has-data{border-color:var(--blue);background:rgba(79,142,247,.06);}
.unit-card.over-budget{border-color:var(--red);background:rgba(248,113,113,.06);}
unit-card.near-budget{border-color:var(--yellow);background:rgba(251,191,36,.06);}
unit-card.no-data{opacity:.5;}
.unit-num{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:4px;}
.unit-boards{font-size:13px;color:var(--blue);font-weight:700;}
unit-spend{font-size:12px;color:var(--ink3);margin-top:2px;}
